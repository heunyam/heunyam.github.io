theme = "devise"

baseURL = 'https://heunyam.github.io/'
languageCode = 'en-us'
title = 'My New Hugo Site'



# relativeURLs = true
enableEmoji = true
# googleAnalytics = ""
# enableRobotsTXT = true
copyright = "&copy; Copyright 2024, Kim Sejun"


[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    title = "About"
    url = "/about/"
    weight = -110
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    title = "Posts"
    url = "/post/"
    weight = -100
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    title = "Categories"
    url = "/categories/"
    weight = -90


# Configuration Features
[params]
  description = "Your meta description"      # Your meta description of the site
  header_title = "김세준"                 # Your header title
  header_subtitle = "Backend Engineer" # Your header subtitle
  # home_image = "/images/avatar.png"          # Path to header image starting from the static directory (optional)
  recent_posts = 5                           # Max amount of recent posts to show
  mainSections = ["posts", "post", "blog"]   # Main sections to include in recent posts
  [params.style]                             # CSS style overrides
    backgroundColor = "#f8f9fa"
    homeImageBorderColor = "#ffffff"
    fontFamilyBase = "Helvetica Neue"        # First-choice font
    fontColor = "#212529"
  [[params.social]]
    fa_icon = "fab fa-github fa-1x"          # Font Awesome icon class
    href = "http://github.com/heunyam"      # Link to associate with icon (http://, https://, mailto:)
